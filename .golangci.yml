run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - godot
    - noctx
    - bodyclose
    - exhaustive
    - gocritic
    - prealloc
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/nodus-protocol/backend
  revive:
    rules:
      - name: exported
        disabled: false
      - name: var-naming
        disabled: false
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: migrations/
      linters:
        - all
  max-issues-per-linter: 50
  max-same-issues: 10
